[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "sh -c 'if [ \"$SERVICE_ROLE\" = \"worker\" ]; then exec celery -A config worker -l info --concurrency ${CELERY_CONCURRENCY:-1}; else python manage.py setup_media && python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py importar_calendario_paroquial --sem-missas && exec gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers ${GUNICORN_WORKERS:-1} --timeout 120; fi'"
# Healthcheck só na API — worker usa backend/railway.worker.toml (sem HTTP)
restartPolicyType = "ON_FAILURE"
