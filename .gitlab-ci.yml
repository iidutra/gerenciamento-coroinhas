stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip
    - frontend/node_modules/

backend-lint:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install ruff
    - ruff check backend/apps backend/config backend/tests
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

backend-test:
  stage: test
  image: python:3.12-slim
  script:
    - cd backend
    - pip install -r requirements.txt -r requirements-dev.txt
    - pytest --cov --cov-fail-under=65
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

frontend-lint:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

frontend-test:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
